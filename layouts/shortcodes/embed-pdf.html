<script type="text/javascript" src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.9.359/pdf.min.js'></script>
<style>
#the-canvas {
  border: 1px solid black;
  direction: ltr;
  width: 100%;
  height: auto;
  display: none;
}
#paginator {
  display: none;
  text-align: center;
  margin-bottom: 10px;
}
#loadingWrapper {
  display: none;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 350px;
}
#loading {
  display: inline-block;
  width: 50px;
  height: 50px;
  border: 3px solid #d2d0d0;
  border-radius: 50%;
  border-top-color: #383838;
  animation: spin 1s ease-in-out infinite;
  -webkit-animation: spin 1s ease-in-out infinite;
}
@keyframes spin {
  to { -webkit-transform: rotate(360deg); }
}
@-webkit-keyframes spin {
  to { -webkit-transform: rotate(360deg); }
}
</style>

<div id="paginator">
    <button id="prev">Previous</button>
    <button id="next">Next</button>
    &nbsp; &nbsp;
    <span>Page: <span id="page_num"></span> / <span id="page_count"></span></span>
</div>
<div id="embed-pdf-container">
    <div id="loadingWrapper">
      <div id="loading"></div>
    </div>
    <canvas id="the-canvas"></canvas>
</div>

<script type="text/javascript">
window.onload = function() {
  var url = '{{ .Get "url" }}';
  var hidePaginator = "{{ .Get "hidePaginator" }}" === "true";
  var hideLoader = "{{ .Get "hideLoader" }}" === "true";
  var selectedPageNum = parseInt("{{ .Get "renderPageNum" }}") || 1;

  var pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.9.359/pdf.worker.min.js';

  var pdfDoc = null,
      pageNum = selectedPageNum,
      pageRendering = false,
      pageNumPending = null,
      scale = 3,
      canvas = document.getElementById('the-canvas'),
      ctx = canvas.getContext('2d'),
      paginator = document.getElementById("paginator"),
      loadingWrapper = document.getElementById('loadingWrapper');

  showPaginator();
  showLoader();

  function addWatermark() {
    var text = '© Justin C Yang · Do not distribute without permission';
    var fontSize = Math.max(14, canvas.width / 50);
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(-Math.PI / 6);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = fontSize + 'px Arial';
    ctx.fillStyle = 'rgba(80, 80, 80, 0.09)';
    var xStep = canvas.width / 2;
    var yStep = canvas.height / 3;
    for (var x = -canvas.width; x <= canvas.width; x += xStep) {
      for (var y = -canvas.height; y <= canvas.height; y += yStep) {
        ctx.fillText(text, x, y);
      }
    }
    ctx.restore();
  }

  function renderPage(num) {
    pageRendering = true;
    pdfDoc.getPage(num).then(function(page) {
      var viewport = page.getViewport({scale: scale});
      canvas.height = viewport.height;
      canvas.width = viewport.width;
      var renderContext = {
        canvasContext: ctx,
        viewport: viewport
      };
      var renderTask = page.render(renderContext);
      renderTask.promise.then(function() {
        addWatermark();
        pageRendering = false;
        showContent();
        if (pageNumPending !== null) {
          renderPage(pageNumPending);
          pageNumPending = null;
        }
      });
    });
    document.getElementById('page_num').textContent = num;
  }

  function showContent() {
    loadingWrapper.style.display = 'none';
    canvas.style.display = 'block';
  }

  function showLoader() {
    if (hideLoader) return;
    loadingWrapper.style.display = 'flex';
    canvas.style.display = 'none';
  }

  function showPaginator() {
    if (hidePaginator) return;
    paginator.style.display = 'block';
  }

  function queueRenderPage(num) {
    if (pageRendering) {
      pageNumPending = num;
    } else {
      renderPage(num);
    }
  }

  function onPrevPage() {
    if (pageNum <= 1) return;
    pageNum--;
    queueRenderPage(pageNum);
  }
  document.getElementById('prev').addEventListener('click', onPrevPage);

  function onNextPage() {
    if (pageNum >= pdfDoc.numPages) return;
    pageNum++;
    queueRenderPage(pageNum);
  }
  document.getElementById('next').addEventListener('click', onNextPage);

  pdfjsLib.getDocument(url).promise.then(function(pdfDoc_) {
    pdfDoc = pdfDoc_;
    var numPages = pdfDoc.numPages;
    document.getElementById('page_count').textContent = numPages;
    if (pageNum > numPages) pageNum = numPages;
    renderPage(pageNum);
  });
}
</script>
